# Shared citation library
# Ingredient files reference these by ID to avoid duplicating full citations.

fda-sunscreen-proposed-rule-2019:
  type: regulatory
  org: FDA
  title: "Proposed Rule: Sunscreen Drug Products for Over-the-Counter Human Use"
  year: 2019
  url: "https://www.federalregister.gov/documents/2019/03/26/2019-03019/sunscreen-drug-products-for-over-the-counter-human-use"

ewg-skin-deep:
  type: database
  org: EWG
  title: "EWG Skin Deep Cosmetics Database"
  url: "https://www.ewg.org/skindeep/"
  note: "Hazard scores on a 1-10 scale; higher = more concern"

acog-skin-care-pregnancy:
  type: guideline
  org: ACOG
  title: "Skin Conditions During Pregnancy"
  year: 2020
  note: "Covers retinoids, hydroquinone, and other topical agents"

acog-moderate-caffeine:
  type: guideline
  org: ACOG
  title: "Committee Opinion 462: Moderate Caffeine Consumption During Pregnancy"
  year: 2010
  note: "Reaffirmed 2020. Less than 200mg/day does not appear to be a major contributing factor in miscarriage or preterm birth"

aap-sunscreen-policy:
  type: guideline
  org: AAP
  title: "Policy Statement: Ultraviolet Radiation - A Hazard to Children and Adolescents"
  year: 2011
  note: "Recommends mineral sunscreen for children; infants under 6 months should avoid direct sun"

who-mercury-cosmetics:
  type: guideline
  org: WHO
  title: "Mercury in Skin Lightening Products"
  year: 2019
  url: "https://www.who.int/news-room/fact-sheets/detail/mercury-and-health"

fda-retinoid-pregnancy:
  type: regulatory
  org: FDA
  title: "FDA Pregnancy Category X Classification for Retinoids"
  year: 2015
  note: "Oral retinoids (isotretinoin) are Category X. Topical retinoids are Category C but generally recommended to avoid."

nih-caffeine-pregnancy:
  type: study
  org: NIH
  title: "Maternal caffeine intake during pregnancy and risk of fetal growth restriction"
  authors: "CARE Study Group"
  journal: "BMJ"
  year: 2008
  doi: "10.1136/bmj.a2332"

jama-sunscreen-absorption-2019:
  type: study
  org: JAMA
  title: "Effect of Sunscreen Application Under Maximal Use Conditions on Plasma Concentration of Sunscreen Active Ingredients"
  authors: "Matta MK, et al."
  journal: "JAMA"
  year: 2019
  doi: "10.1001/jama.2019.5586"
  finding: "All 4 tested chemical sunscreen actives exceeded FDA threshold for systemic absorption after single application"

fda-zinc-oxide-grase:
  type: regulatory
  org: FDA
  title: "FDA GRASE (Generally Recognized as Safe and Effective) Determination for Zinc Oxide and Titanium Dioxide"
  year: 2019
  note: "Only two sunscreen actives deemed GRASE by FDA in 2019 proposed rule"

cir-salicylic-acid:
  type: review
  org: CIR
  title: "Cosmetic Ingredient Review: Salicylic Acid"
  year: 2019
  note: "CIR Expert Panel concluded safe in cosmetic formulations at current concentrations"

aap-aspirin-reye:
  type: guideline
  org: AAP
  title: "Reye Syndrome and Salicylate Use"
  note: "Systemic salicylates contraindicated in children due to Reye syndrome risk"

# --- CIR (Cosmetic Ingredient Review) expert panel safety assessments ---
# Independent industry-funded but peer-reviewed safety reviews for cosmetic
# ingredients; widely cited by FDA, EU SCCS, and regulators.

cir-glycerin:
  type: review
  org: CIR
  title: "Final Report on the Safety Assessment of Glycerin"
  journal: "International Journal of Toxicology"
  year: 2019
  url: "https://www.cir-safety.org/ingredients"
  note: "CIR expert panel concluded glycerin is safe in the present practices of use and concentration in cosmetics"

cir-dimethicone:
  type: review
  org: CIR
  title: "Safety Assessment of Dimethicone and Related Polymers as Used in Cosmetics"
  journal: "International Journal of Toxicology"
  year: 2021
  url: "https://www.cir-safety.org/ingredients"
  note: "CIR concluded dimethicone and related silicone polymers are safe in cosmetic use"

cir-cetyl-alcohol:
  type: review
  org: CIR
  title: "Safety Assessment of Cetyl Alcohol, Stearyl Alcohol, and Related Fatty Alcohols"
  journal: "International Journal of Toxicology"
  year: 2020
  url: "https://www.cir-safety.org/ingredients"
  note: "CIR concluded fatty alcohols including cetyl alcohol are safe in cosmetic formulations; these are emulsifiers and emollients, not drying alcohols"

cir-alkonium-chlorides:
  type: review
  org: CIR
  title: "Safety Assessment of Alkonium Chlorides as Used in Cosmetics"
  journal: "International Journal of Toxicology"
  year: 2018
  url: "https://www.cir-safety.org/ingredients"
  note: "CIR concluded benzalkonium chloride is safe as used in cosmetics at concentrations up to 0.1 percent in leave-on products"

cir-isopropyl-esters:
  type: review
  org: CIR
  title: "Safety Assessment of Isopropyl Esters as Used in Cosmetics (including Isopropyl Palmitate)"
  journal: "International Journal of Toxicology"
  year: 2019
  url: "https://www.cir-safety.org/ingredients"
  note: "CIR concluded isopropyl palmitate and related isopropyl esters are safe in cosmetic use"

cir-quaternary-ammonium:
  type: review
  org: CIR
  title: "Safety Assessment of Quaternium Compounds (including Distearyldimonium Chloride)"
  journal: "International Journal of Toxicology"
  year: 2019
  url: "https://www.cir-safety.org/ingredients"
  note: "CIR concluded quaternary ammonium conditioning agents including distearyldimonium chloride are safe in cosmetic use with minimal skin penetration"

cir-sodium-chloride:
  type: review
  org: CIR
  title: "Safety Assessment of Sodium Chloride as Used in Cosmetics"
  year: 2017
  url: "https://www.cir-safety.org/ingredients"
  note: "CIR concluded sodium chloride is safe in cosmetic formulations"

# --- FDA OTC drug monographs ---

fda-skin-protectant-monograph:
  type: regulatory
  org: FDA
  title: "Skin Protectant Drug Products for Over-the-Counter Human Use, Final Monograph (21 CFR 347)"
  year: 2003
  url: "https://www.ecfr.gov/current/title-21/chapter-I/subchapter-D/part-347"
  note: "Recognizes petrolatum, dimethicone, and colloidal oatmeal (avena sativa kernel flour) as Category I (safe and effective) OTC skin protectants"

# --- American Academy of Dermatology guidance ---

aad-pregnancy-skincare:
  type: guideline
  org: AAD
  title: "Skin Care During Pregnancy"
  url: "https://www.aad.org/public/everyday-care/skin-care-secrets/routine/pregnancy-skin-care"
  note: "AAD guidance on pregnancy-safe skincare; recommends gentle moisturizers with petrolatum, glycerin, hyaluronic acid, and mineral sunscreen"

# --- Nursing-specific references ---

lactmed:
  type: database
  org: NIH
  title: "LactMed Database (Drugs and Lactation Database)"
  url: "https://www.ncbi.nlm.nih.gov/books/NBK501922/"
  note: "NIH National Library of Medicine peer-reviewed database of drugs and chemicals that breastfeeding mothers may be exposed to; authoritative source for lactation safety"

mother-to-baby:
  type: guideline
  org: OTIS
  title: "MotherToBaby Fact Sheets"
  url: "https://mothertobaby.org/fact-sheets-parent/"
  note: "Organization of Teratology Information Specialists (OTIS) evidence-based fact sheets on exposures during pregnancy and breastfeeding"

# --- EU Scientific Committee on Consumer Safety ---

eu-sccs-cosmetic-safety:
  type: regulatory
  org: "EU SCCS"
  title: "Scientific Committee on Consumer Safety Opinions on Cosmetic Ingredients"
  url: "https://health.ec.europa.eu/scientific-committees/scientific-committee-consumer-safety-sccs_en"
  note: "EU SCCS provides independent scientific opinions on the safety of cosmetic ingredients in the EU market"

# --- Sources for Pregnancy Red List (Phase B1) ---

mothertobaby-hydroquinone:
  type: guideline
  org: OTIS
  title: "MotherToBaby Fact Sheet: Hydroquinone"
  url: "https://mothertobaby.org/fact-sheets/hydroquinone-pregnancy/"
  note: "Skin lightening agent; up to 35-45 percent systemic absorption; most providers recommend avoiding use during pregnancy"

lactmed-hydroquinone:
  type: database
  org: NIH
  title: "LactMed: Hydroquinone"
  url: "https://www.ncbi.nlm.nih.gov/books/NBK500669/"
  note: "LactMed does not formally contraindicate topical hydroquinone in breastfeeding but notes high absorption and recommends avoidance if possible"

mothertobaby-minoxidil:
  type: guideline
  org: OTIS
  title: "MotherToBaby Fact Sheet: Minoxidil"
  url: "https://mothertobaby.org/fact-sheets/minoxidil-pregnancy/"
  note: "Topical hair growth drug; limited human pregnancy data, animal studies show fetal effects; advises against use"

fda-sunscreen-actives-2021:
  type: regulatory
  org: FDA
  title: "FDA Deemed Final Order: Over-the-Counter Sunscreen Drug Products"
  year: 2021
  url: "https://www.fda.gov/drugs/understanding-over-counter-medicines/questions-and-answers-fda-posts-deemed-final-order-and-proposed-order-over-counter-sunscreen"
  note: "Of 16 sunscreen active ingredients, only zinc oxide and titanium dioxide are GRASE; 12 others (including oxybenzone, octinoxate, avobenzone) lack sufficient data; PABA and trolamine salicylate deemed not GRASE"

iarc-formaldehyde:
  type: regulatory
  org: IARC
  title: "IARC Monograph Vol 100F: Formaldehyde"
  year: 2012
  url: "https://publications.iarc.fr/123"
  note: "Formaldehyde classified as IARC Group 1 (carcinogenic to humans), sufficient evidence for nasopharyngeal cancer and leukemia"

fda-keratin-formaldehyde-alert:
  type: regulatory
  org: FDA
  title: "FDA Hazard Alert: Hair-Smoothing Products Containing Formaldehyde"
  url: "https://www.fda.gov/cosmetics/cosmetic-products/hair-smoothing-products-could-release-formaldehyde"
  note: "FDA and OSHA have issued hazard alerts for keratin smoothing treatments (Brazilian blowout etc.) that release formaldehyde during application, posing occupational and consumer inhalation risk"

osha-formaldehyde:
  type: regulatory
  org: OSHA
  title: "OSHA Formaldehyde Standard 29 CFR 1910.1048"
  url: "https://www.osha.gov/formaldehyde"
  note: "OSHA permissible exposure limit 0.75 ppm 8-hour TWA; requires hazard communication and exposure controls"

eu-cosmetics-annex-ii:
  type: regulatory
  org: "EU Commission"
  title: "Regulation (EC) No 1223/2009 Annex II: List of Substances Prohibited in Cosmetic Products"
  url: "https://single-market-economy.ec.europa.eu/sectors/cosmetics/cosmetic-ingredient-database_en"
  note: "EU Cosmetics Regulation Annex II prohibits over 1,600 substances including mercury compounds, lead compounds, certain phthalates, and formaldehyde in cosmetic products"

fda-lead-cosmetics:
  type: regulatory
  org: FDA
  title: "FDA Guidance on Lead in Cosmetic Lip Products and Externally Applied Cosmetics"
  year: 2016
  url: "https://www.fda.gov/cosmetics/potential-contaminants-cosmetics/lead-cosmetic-lip-products-and-externally-applied-cosmetics-recommended-maximum-level"
  note: "FDA recommends lead impurities not exceed 10 ppm in lip products and externally applied cosmetics; warns against traditional eye cosmetics (kohl, kajal, surma) that may contain high levels of lead"

cdc-lead-exposure:
  type: regulatory
  org: CDC
  title: "CDC: Lead Exposure During Pregnancy"
  url: "https://www.cdc.gov/nceh/lead/prevention/pregnant.htm"
  note: "No safe level of lead exposure; lead crosses placenta and can cause developmental and neurological harm to fetus"

fda-phthalates-cosmetics:
  type: regulatory
  org: FDA
  title: "FDA: Phthalates in Cosmetics"
  url: "https://www.fda.gov/cosmetics/cosmetic-ingredients/phthalates-cosmetics"
  note: "Discusses DBP, DMP, DEP in cosmetics; notes lack of complete ingredient labeling for fragrance components which may contain phthalates"

who-mercury-skin-lightening:
  type: guideline
  org: WHO
  title: "WHO: Mercury in Skin Lightening Products"
  year: 2019
  url: "https://www.who.int/publications/i/item/WHO-CED-PHE-EPE-19.13"
  note: "WHO identifies mercury-containing skin lightening products as a public health concern; mercury is a potent neurotoxin; pregnant women and infants are most at risk"

tisserand-young-eo-safety:
  type: review
  org: "Tisserand Institute"
  title: "Essential Oil Safety: A Guide for Health Care Professionals (2nd Edition)"
  authors: "Tisserand R, Young R"
  year: 2014
  note: "Standard reference for essential oil safety; identifies oils contraindicated in pregnancy including pennyroyal, tansy, wintergreen (methyl salicylate), savin, sage, wormwood, and others"

naha-pregnancy-safety:
  type: guideline
  org: NAHA
  title: "National Association for Holistic Aromatherapy: Safety Information"
  url: "https://naha.org/explore-aromatherapy/safety"
  note: "NAHA professional guidance on essential oil safety in pregnancy, nursing, and pediatric use"

acog-skincare-pregnancy-2021:
  type: guideline
  org: ACOG
  title: "Skin Conditions During Pregnancy FAQ"
  year: 2021
  url: "https://www.acog.org/womens-health/faqs/skin-conditions-during-pregnancy"
  note: "ACOG patient guidance on pregnancy-safe skincare; avoid retinoids and hydroquinone; limited salicylic acid OK; chemical sunscreens limited data"
