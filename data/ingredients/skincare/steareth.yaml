    rating: safe
    summary: >
      Ethoxylated stearyl alcohol emulsifier family. Helps oil and water phases mix in creams and lotions. CIR-reviewed safe. No pregnancy concerns.
    dose_dependent: false
    exposure_route: topical
    evidence_strength: strong

  nursing:
    rating: safe
    summary: >
      Safe during nursing.
    dose_dependent: false
    exposure_route: topical
    evidence_strength: strong

  baby:
    rating: safe
    summary: >
      Safe for infants in cosmetic formulations.
    min_safe_age_months: 0
    exposure_route: topical
    evidence_strength: strong

