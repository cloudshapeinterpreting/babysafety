safety:
  pregnancy:
    rating: avoid
    summary: >
      This class entry covers essential oils that Tisserand and
      Young's "Essential Oil Safety" (the standard professional
      reference) identifies as contraindicated in pregnancy due to
      emmenagogic, abortifacient, uterine-stimulant, or
      fetotoxic effects.
    details: >
      Not all essential oils are unsafe in pregnancy. This entry is
      scoped specifically to oils with documented pregnancy
      contraindications per Tisserand & Young's "Essential Oil
      Safety" (2nd edition, the standard professional reference)
      and NAHA guidance:

      - Pennyroyal: the most well-documented abortifacient; also
        hepatotoxic; NEVER use in pregnancy or nursing.
      - Wintergreen (Gaultheria procumbens): contains 98+ percent
        methyl salicylate; salicylate toxicity risk for both mother
        and fetus; also a risk for infants (Reye-like concerns).
      - Tansy, savin, mugwort, wormwood: abortifacient/toxic.
      - Sage (Salvia officinalis, not clary sage): contains thujone;
        emmenagogic.
      - Clary sage (Salvia sclarea): traditionally used by midwives
        to induce labor; avoid until term.
      - Rosemary (high cineole chemotypes): possible
        uterine-stimulant effects.
      - Juniper berry: historically used as abortifacient;
        contraindicated.
      - Basil (high estragole chemotypes): estragole is potentially
        genotoxic.
      - Parsley seed: traditionally used to induce miscarriage.
      - Hyssop: contains pulegone; neurotoxic and abortifacient.
      - Camphor: crosses placenta; fetotoxic at high doses;
        neurotoxic.

      The mechanism of concern varies but includes uterine
      stimulation, hormonal/estrogenic activity, hepatotoxicity,
      neurotoxicity, and salicylate content. Typical routes of
      exposure in pregnancy are aromatherapy diffusers, massage
      oils, DIY skincare, and some "natural" cleaning products.
      Topical use is generally the highest-concern route because
      essential oils are absorbed through skin.

      This is NOT a blanket statement that all essential oils are
      unsafe. Many essential oils (e.g., lavender, chamomile,
      citrus, frankincense) are considered lower risk and even
      widely used in prenatal aromatherapy. The list here
      specifically targets the well-documented high-risk oils.
    dose_dependent: true
    exposure_route: multiple
    evidence_strength: limited
  nursing:
    rating: caution
    summary: >
      Several of these oils have additional lactation concerns
      (peppermint/sage reduce milk supply; wintergreen is a
      salicylate risk for the infant via skin contact). Avoid
      direct application to chest/breast area. Avoid pennyroyal,
      wintergreen, tansy, and mugwort entirely.
    details: >
      Peppermint (not on this pregnancy-avoid list, but also a
      nursing consideration) and sage have traditional use as
      lactation suppressants. Wintergreen is a particular concern
      because it is essentially concentrated methyl salicylate and
      can cause salicylate toxicity in an infant via skin contact
      if applied to the chest area. Pennyroyal remains absolutely
      contraindicated.
    dose_dependent: true
    exposure_route: multiple
    evidence_strength: limited
  baby:
    rating: avoid
    summary: >
      Several members of this list are especially dangerous for
      infants (wintergreen, camphor, pennyroyal). See individual
      entries for camphor and wintergreen/methyl salicylate for
      baby-specific details.
    details: >
      Infants are highly sensitive to essential oils. Wintergreen
      and camphor have caused fatalities in small children from
      small ingestions or skin applications. The AAP warns against
      essential oil use in and around infants under 2.
    min_safe_age_months: null
    exposure_route: multiple
    evidence_strength: limited
sources:
