notes: >
  This is a class entry. If a product lists any of the aliases above,
  the pregnancy avoid rating applies. This is one of the most
  frequently asked-about ingredient categories in pregnancy and the
  answer is genuinely nuanced: some essential oils are fine, some
  specific oils are absolutely contraindicated. Always check the
  specific oil against Tisserand & Young or consult a clinical
  aromatherapist with prenatal experience. Dilution, route, and
  duration all matter -- a drop of clary sage diffused briefly in a
  room is different from 20 drops in a massage oil applied to the
  abdomen daily.
