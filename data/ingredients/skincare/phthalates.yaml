id: phthalates
name: Phthalates
aliases:
  - Dibutyl Phthalate
  - DBP
  - Diethyl Phthalate
  - DEP
  - Di(2-ethylhexyl) Phthalate
  - DEHP
  - Benzyl Butyl Phthalate
  - BBP
  - Dimethyl Phthalate
  - DMP
  - Diisobutyl Phthalate
  - DIBP
