safer_alternatives:
  - name: Phthalate-free fragrance
    id: null
    note: "Some manufacturers voluntarily label phthalate-free"
  - name: Fragrance-free products
    id: null
    note: "Eliminates the primary hidden source of phthalates in cosmetics"
  - name: Natural essential oil fragrance
    id: null
    note: "Caveat: some essential oils have their own pregnancy concerns; see essential oils entry"

notes: >
  The practical difficulty with phthalates is that US cosmetic
  labeling does not require disclosure of individual fragrance
  components, so "fragrance" or "parfum" on a label may or may not
  contain phthalates. The safest practical approach during pregnancy
  is to favor fragrance-free products or those explicitly labeled
  phthalate-free. Nail polishes to watch for: the "toxic trio" of
  DBP, toluene, and formaldehyde -- increasingly phased out by major
  brands but still present in some salon-grade products.
