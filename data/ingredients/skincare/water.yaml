safety:
  pregnancy:
    rating: safe
    summary: >
      Universal solvent; inert base ingredient in cosmetics. No safety
      concerns during pregnancy.
    details: >
      Water (Aqua) is the most common ingredient in water-based cosmetic
      formulations, serving as the solvent for all water-soluble components.
      It has no pharmacological activity and no known safety concerns at
      any life stage.
    dose_dependent: false
    exposure_route: topical
    evidence_strength: definitive
  nursing:
    rating: safe
    summary: >
      Safe during nursing. Inert solvent with no systemic effects.
    details: >
      No transfer concerns; water is a universal biological solvent.
    dose_dependent: false
    exposure_route: topical
    evidence_strength: definitive
  baby:
    rating: safe
    summary: >
      Safe for infants and children. Used in virtually all baby skincare
      and bath products.
    min_safe_age_months: 0
    exposure_route: topical
    evidence_strength: definitive
