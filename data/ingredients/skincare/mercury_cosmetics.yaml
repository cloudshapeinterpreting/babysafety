safer_alternatives:
  - name: Azelaic Acid
    id: null
    note: "Safe brightening option in pregnancy per ACOG"
  - name: Niacinamide
    id: null
    note: "Safe for pigmentation and skin tone during pregnancy"
  - name: Vitamin C
    id: null
    note: "Safe antioxidant with brightening effects"

notes: >
  Mercury in cosmetics is illegal in most regulated markets but
  continues to appear in imported and counterfeit products,
  especially skin lighteners. This entry will not match on most US
  drugstore products. It exists so that the tool can flag
  "skin lightening," "fairness cream," or kohl/kajal/surma products
  that may contain mercury. If a product is from an unfamiliar
  import source and makes skin-lightening claims, the safest
  assumption is to avoid it. The concern is so high that the WHO
  runs a specific campaign on mercury-containing skin lighteners.
