id: mercury_cosmetics
name: Mercury (in Cosmetics)
aliases:
  - Mercury
  - Mercurous Chloride
  - Calomel
  - Mercuric Chloride
  - Ammoniated Mercury
  - Mercuric Iodide
  - Mercurio
  - Hg
  - Cinnabaris
  - Hydrargyri Oxidum Rubrum
cas_number: "7439-97-6"

category: toxic_contaminant
product_types:
  - skincare
  - cosmetics

safety:
  pregnancy:
    rating: avoid
    summary: >
      Potent neurotoxin that crosses the placenta. Found in some
      imported skin-lightening creams and soaps, kohl eye cosmetics,
      and counterfeit products. No safe exposure level during
      pregnancy. WHO, FDA, and EU have all issued warnings.
    details: >
      Mercury is a potent neurotoxin that readily crosses the
      placental barrier and accumulates in the fetal brain, where it
      can cause severe neurodevelopmental harm. Organic mercury
      compounds are especially dangerous. The EU Cosmetics Regulation
      prohibits mercury compounds in cosmetics (Annex II). The FDA
      limits mercury in cosmetics to trace contaminant levels (1 ppm).

      The WHO has identified mercury-containing skin lightening
      products as a major public health concern, particularly in
      imports from certain countries. These products may be sold in
      specialty stores, online, or shipped from abroad, and may not
      disclose mercury on the label.

      Warning signs: unlabeled or foreign-language skin lightening
      creams; products with claims like "anti-aging spot fader,"
      "skin whitening," or "freckle remover" from unregulated
      sources; products that cause rapid skin lightening; traditional
      eye cosmetics (kohl, kajal, surma) which may contain mercury
      or lead.
    dose_dependent: false
    exposure_route: multiple

  nursing:
    rating: avoid
    summary: >
      Mercury transfers to breast milk and to the infant. Avoid all
      mercury-containing products during lactation.
    dose_dependent: false
    exposure_route: multiple

  baby:
    rating: avoid
    summary: >
      Never use mercury-containing cosmetics on infants or children.
      Especially avoid traditional eye cosmetics of unknown
      provenance.
    min_safe_age_months: null
    exposure_route: multiple

sources:
