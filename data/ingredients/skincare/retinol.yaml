notes: >
  This is a class entry covering all retinoid forms. The most common forms
  found in OTC products are retinol, retinyl palmitate, and retinaldehyde.
  Prescription forms include tretinoin, adapalene, and tazarotene.
  Isotretinoin (Accutane) is the highest-risk oral form.
