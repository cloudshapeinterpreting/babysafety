safety:
  pregnancy:
    rating: avoid
    summary: >
      Known teratogen. All retinoids (oral and topical) should be avoided
      during pregnancy. Oral isotretinoin causes severe birth defects.
    details: >
      Retinoids are Vitamin A derivatives used in anti-aging and acne products.
      Oral retinoids (isotretinoin/Accutane) are FDA Pregnancy Category X --
      proven to cause craniofacial, cardiac, and CNS birth defects. While
      topical retinoids have much lower systemic absorption, ACOG and most
      dermatologists recommend avoiding all forms during pregnancy as a
      precaution. No safe threshold has been established for pregnancy.
    dose_dependent: false
    exposure_route: topical

  nursing:
    rating: caution
    summary: >
      Low-concentration topical retinol is likely low risk during nursing,
      but data is limited. Oral retinoids should still be avoided.
    details: >
      Systemic absorption from topical retinol is minimal, and transfer to
      breast milk from topical use is expected to be negligible. However,
      oral retinoids remain contraindicated. Many providers recommend
      continuing to avoid topical retinoids during nursing as a precaution
      given limited data.
    dose_dependent: true
    exposure_route: topical

  baby:
    rating: avoid
    summary: >
      Retinoid-containing products should not be used on infants or children.
    details: >
      Retinoids are potent active ingredients not formulated for infant skin.
      Children have higher surface-area-to-body-weight ratios increasing
      systemic absorption risk.
    min_safe_age_months: null
    exposure_route: topical

sources:
