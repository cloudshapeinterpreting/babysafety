id: oxybenzone
name: Oxybenzone
aliases:
  - Benzophenone-3
  - BP-3
  - 2-Hydroxy-4-methoxybenzophenone
cas_number: "131-57-7"

category: chemical_sunscreen
product_types:
  - skincare
  - cosmetics

safety:
  pregnancy:
    rating: avoid
    summary: >
      Potential endocrine disruptor with significant systemic absorption.
      Associated with lower birth weight in some studies.
    details: >
      Oxybenzone is readily absorbed through the skin -- FDA found systemic
      levels exceeding their safety threshold after a single application.
      It has been detected in amniotic fluid, breast milk, and urine.
      Animal and epidemiological studies suggest endocrine-disrupting
      effects. A 2020 study found associations between maternal oxybenzone
      exposure and reduced birth weight in male infants.
    dose_dependent: true
    exposure_route: topical

  nursing:
    rating: avoid
    summary: >
      Detected in breast milk in 97% of samples tested. Potential endocrine
      disruption concern for nursing infant.
    details: >
      Multiple studies have confirmed oxybenzone transfer to breast milk.
      Given the endocrine disruption concerns and availability of safer
      mineral alternatives, avoidance during nursing is recommended.
    dose_dependent: true
    exposure_route: topical

  baby:
    rating: avoid
    summary: >
      Not recommended for infants. AAP recommends mineral sunscreens for
      children; infants under 6 months should avoid direct sun exposure.
    details: >
      Infants have a higher surface-area-to-body-weight ratio, increasing
      systemic exposure. Immature metabolic pathways reduce clearance.
      AAP recommends shade and clothing as primary sun protection for
      infants under 6 months, with mineral sunscreen on small exposed
      areas if needed.
    min_safe_age_months: 6
    exposure_route: topical

sources:
  - ref: fda-sunscreen-proposed-rule-2019
  - ref: jama-sunscreen-absorption-2019
  - ref: ewg-skin-deep
  - ref: aap-sunscreen-policy
  - type: study
    authors: "Ghazipura M, et al."
    title: "Exposure to benzophenone-3 and reproductive toxicity: A systematic review of human and animal studies"
    journal: "Reproductive Toxicology"
    year: 2017
    doi: "10.1016/j.reprotox.2017.08.015"
    finding: "Systematic review found evidence of endocrine disruption and reproductive effects"

safer_alternatives:
  - name: Zinc Oxide
    id: zinc_oxide
    note: "Mineral sunscreen; sits on skin surface, FDA GRASE"
  - name: Titanium Dioxide
    id: null
    note: "Mineral sunscreen; FDA GRASE, minimal absorption"

notes: >
  Hawaii, Key West, Palau, and the US Virgin Islands have banned oxybenzone
  in sunscreens due to coral reef damage. This regulatory momentum has
  increased availability of mineral alternatives.
last_reviewed: "2026-04-05"
confidence: high
